name: run-iteration

on:
  push:
    branches: [main]
    paths:
      - "iterations/*/config.yaml"
  workflow_dispatch:
    inputs:
      iteration:
        description: "Iteration name (e.g. 001_baseline)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hrs; kernel polling caps at 5 hrs
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      COMP_SLUG: ${{ vars.COMP_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve iteration
        id: pick
        run: |
          set -eu
          if [ -n "${{ inputs.iteration }}" ]; then
            ITER="${{ inputs.iteration }}"
          else
            # newest iterations/*/config.yaml changed in this push
            ITER=$(git log -1 --name-only --pretty=format: | grep -E '^iterations/[^/]+/config.yaml$' | head -1 | cut -d/ -f2)
          fi
          if [ -z "$ITER" ]; then echo "no iteration to run"; exit 0; fi
          echo "iteration=$ITER" >> "$GITHUB_OUTPUT"
          echo "Running iteration: $ITER"

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install tooling
        run: pip install kaggle jupytext pyyaml

      - name: Build kernel
        if: steps.pick.outputs.iteration != ''
        run: python scripts/build_notebook.py "${{ steps.pick.outputs.iteration }}"

      - name: Push kernel to Kaggle
        if: steps.pick.outputs.iteration != ''
        run: kaggle kernels push -p build/kernel

      - name: Poll for completion
        if: steps.pick.outputs.iteration != ''
        id: poll
        run: |
          set -eu
          KID="${KAGGLE_USERNAME}/pipeline-iter-$(echo '${{ steps.pick.outputs.iteration }}' | tr '_' '-')"
          echo "Polling $KID"
          for i in $(seq 1 300); do
            STATUS=$(kaggle kernels status "$KID" 2>&1 || true)
            echo "[$i] $STATUS"
            case "$STATUS" in
              *complete*) echo "status=complete" >> "$GITHUB_OUTPUT"; exit 0 ;;
              *error*|*cancelAcknowledged*|*cancelRequested*) echo "status=error"  >> "$GITHUB_OUTPUT"; exit 0 ;;
            esac
            sleep 60
          done
          echo "status=timeout" >> "$GITHUB_OUTPUT"

      - name: Pull kernel output
        if: steps.pick.outputs.iteration != ''
        run: |
          set -eu
          ITER="${{ steps.pick.outputs.iteration }}"
          KID="${KAGGLE_USERNAME}/pipeline-iter-$(echo "$ITER" | tr '_' '-')"
          OUT="iterations/$ITER/kernel_output"
          mkdir -p "$OUT"
          kaggle kernels output "$KID" -p "$OUT" || true
          ls -la "$OUT"

      - name: Open results PR
        if: steps.pick.outputs.iteration != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ITER="${{ steps.pick.outputs.iteration }}"
          STATUS="${{ steps.poll.outputs.status }}"
          BRANCH="results/$ITER"
          LABEL="results"
          TITLE="Results: iteration $ITER"
          if [ ! -s "iterations/$ITER/kernel_output/submission.csv" ] || [ "$STATUS" != "complete" ]; then
            LABEL="broken"
            TITLE="BROKEN: iteration $ITER (status=$STATUS)"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "iterations/$ITER/kernel_output"
          git commit -m "$TITLE" || { echo "nothing to commit"; exit 0; }
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$TITLE" \
            --body "Auto-generated by run-iteration. Kaggle kernel status: \`$STATUS\`. Review metrics.json before approving submit.yml." \
            --label "$LABEL" || true
