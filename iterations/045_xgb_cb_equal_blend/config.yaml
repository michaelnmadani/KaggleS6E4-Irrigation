# Iteration 045 (website V57) - V34 XGB + V56 CatBoost equal-blend.
#
# V56 CB solo CV 0.97543 (best single since V34). Combining XGB (V34) + CB
# at probability level. Both use V34's exact OrderedTE feature stack.
# Equal weights since CV is similar; let class_weight_optuna fix bias.
#
# Runtime: XGB GPU ~50min + CB GPU ~22min + Optuna <1min = ~1.3h.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

kernel:
  enable_gpu: true
  enable_internet: true

pip_install:
  - optuna

features:
  - fill_na_median
  - s6e4_digit_extraction_wide
  - s6e4_freq_filter_cats
  - ordered_te

model:
  - xgb
  - catboost

blend_weights:
  xgb: 0.5
  catboost: 0.5

postprocess:
  - class_weight_optuna

optuna_trials: 200

params:
  xgb:
    num_boost_round: 512
    early_stopping_rounds: 1024
    eta: 0.1
    max_depth: 4
    max_leaves: 30
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 5
    reg_lambda: 5
    min_child_weight: 2
    tree_method: hist
    max_bin: 10000
    device: cuda
    seed: 42
  catboost:
    iterations: 3000
    early_stopping_rounds: 100
    learning_rate: 0.05
    depth: 6
    l2_leaf_reg: 5.0
    random_seed: 42
    task_type: GPU
    bootstrap_type: Bayesian
    bagging_temperature: 1.0

cv:
  n_splits: 5
  seed: 42
  stratified: false
