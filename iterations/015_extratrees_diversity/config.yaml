# Iteration 015 (website V27) — add ExtraTreesClassifier for hypothesis-space
# diversity, then re-stack.
#
# V26 (0.97187) showed meta-stacker pruned 10/24 redundant meta-features — all
# four GBM base models have correlated errors. To break the 0.972 ceiling we
# need an orthogonal base model family.
#
# ExtraTrees (Geurts 2006) uses RANDOM split thresholds instead of optimal ones,
# producing genuinely different error patterns vs GBM. Fast (~30-60 min on
# 640k x 32 features x 10 folds), no GPU. Proven in many Kaggle stacks as the
# "other tree" that decorrelates GBM errors.
#
# Expected: ET standalone will score ~0.960-0.965 (weaker than GBM), but as
# the 5th meta-feature source it should let the meta-learner extract +0.001
# to +0.002 more from error-decorrelation. Target CV: 0.972-0.974.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 0.35

features:
  - fill_na_median
  - s6e4_threshold_booleans
  - s6e4_interactions
  - label_encode
  - target_encode_multiclass

model:
  - lgbm
  - xgb
  - catboost
  - catboost_a
  - extra_trees

# ET gets 0.05 weight in the base blend (ensemble-selection principle: weaker
# models in the base can still contribute via meta-features).
blend_weights:
  catboost: 0.38
  catboost_a: 0.22
  lgbm: 0.25
  xgb: 0.10
  extra_trees: 0.05

postprocess:
  - meta_stacker
  - caruana

params:
  lgbm:
    num_boost_round: 2500
    early_stopping_rounds: 100
    learning_rate: 0.04
    num_leaves: 63
    min_data_in_leaf: 50
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    lambda_l2: 1.5
  xgb:
    num_boost_round: 2000
    early_stopping_rounds: 100
    eta: 0.04
    max_depth: 8
    subsample: 0.85
    colsample_bytree: 0.85
    reg_lambda: 1.5
  catboost:
    iterations: 2500
    early_stopping_rounds: 150
    learning_rate: 0.04
    depth: 7
    l2_leaf_reg: 5.0
    random_seed: 42
    rsm: 0.85
    random_strength: 1.0
  catboost_a:
    iterations: 2000
    early_stopping_rounds: 150
    learning_rate: 0.05
    depth: 8
    l2_leaf_reg: 3.0
    random_seed: 123
    rsm: 0.75
    random_strength: 2.0
  extra_trees:
    n_estimators: 800
    min_samples_leaf: 50
    max_features: 0.85
    random_state: 42

cv:
  n_splits: 10
  seed: 42
  stratified: true
