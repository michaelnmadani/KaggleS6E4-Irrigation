# Iter 051 (website V62) — V60 + miadul w=1.0 (full weight). Re-launch of cancelled
# 050 due to Kaggle slug issue with "-w10" terminal suffix.
target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy
class_weights: balanced
extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 1.0
kernel: { enable_gpu: true, enable_internet: true }
pip_install: [optuna]
features: [fill_na_median, s6e4_digit_extraction_wide, s6e4_freq_filter_cats, ordered_te]
model: [xgb]
postprocess: [class_weight_optuna]
optuna_trials: 200
params:
  xgb:
    num_boost_round: 1000
    early_stopping_rounds: 80
    eta: 0.07
    max_depth: 5
    max_leaves: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 5
    reg_lambda: 5
    min_child_weight: 2
    tree_method: hist
    max_bin: 10000
    device: cuda
    seed: 42
cv: { n_splits: 5, seed: 42, stratified: false }
