# Iteration 047 (website V59) - 8-seed XGB averaging on V34 yunsuxiaozi recipe.
# 8 seeds tighter mean than V50's 3-seed.
target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy
class_weights: balanced
kernel:
  enable_gpu: true
  enable_internet: true
pip_install:
  - optuna
features:
  - fill_na_median
  - s6e4_digit_extraction_wide
  - s6e4_freq_filter_cats
  - ordered_te
model:
  - xgb
  - xgb_a
  - xgb_b
  - xgb_c
  - xgb_d
  - xgb_e
  - xgb_f
  - xgb_g
blend_weights:
  xgb: 0.125
  xgb_a: 0.125
  xgb_b: 0.125
  xgb_c: 0.125
  xgb_d: 0.125
  xgb_e: 0.125
  xgb_f: 0.125
  xgb_g: 0.125
postprocess:
  - class_weight_optuna
optuna_trials: 200
params:
  xgb:
    num_boost_round: 512
    early_stopping_rounds: 1024
    eta: 0.1
    max_depth: 4
    max_leaves: 30
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 5
    reg_lambda: 5
    min_child_weight: 2
    tree_method: hist
    max_bin: 10000
    device: cuda
    seed: 42
  xgb_a:
    num_boost_round: 512
    early_stopping_rounds: 1024
