# Iteration 014 (website V26) — compact stack + Caruana hill-climb.
#
# V25 (iter 013) hit Kaggle's 12h hard cap with no metrics — 3 CB seeds x 10
# folds x ~124 features was too heavy. V26 trims to the smallest viable
# diversified stack:
#   - Feature set: V15 minimal (32 cols pre-TE) — V23 showed 124-feature blowup
#     HURT CatBoost (0.96978 -> 0.96932). TE bug is fixed now (V24 landed it),
#     so TE actually works on the small set too.
#   - 2 CB seeds (drop catboost_b). catboost + catboost_a.
#   - LGBM + XGB unchanged.
#   - Meta-stacker (proven +0.0035 in V24).
#   - Caruana greedy hill-climb stacked AFTER meta_stacker. Only accepted if
#     it beats the meta-stacker output. Ref: Caruana 2004 (Ensemble Selection
#     from Libraries of Models). Directly optimizes balanced_accuracy; closes
#     the objective-mismatch gap that L1/L2/EN logreg meta leaves open.
#
# Runtime budget: ~1.5h CB + ~1.5h CB_a + ~1h LGBM + ~1h XGB + meta+caruana ~5min
# = ~5h. Safe under 12h cap.
#
# Expected CV: base blend 0.969-0.971, meta +0.003 -> 0.972-0.974, Caruana +0.001
# -> 0.973-0.975. Target: clear 0.975.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 0.35

features:
  - fill_na_median
  - s6e4_threshold_booleans
  - s6e4_interactions
  - label_encode
  - target_encode_multiclass

model:
  - lgbm
  - xgb
  - catboost
  - catboost_a

# CB dominant (0.65 total proven from V22), split 0.40/0.25 between seeds.
blend_weights:
  catboost: 0.40
  catboost_a: 0.25
  lgbm: 0.25
  xgb: 0.10

postprocess:
  - meta_stacker
  - caruana

params:
  lgbm:
    num_boost_round: 2500
    early_stopping_rounds: 100
    learning_rate: 0.04
    num_leaves: 63
    min_data_in_leaf: 50
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    lambda_l2: 1.5
  xgb:
    num_boost_round: 2000
    early_stopping_rounds: 100
    eta: 0.04
    max_depth: 8
    subsample: 0.85
    colsample_bytree: 0.85
    reg_lambda: 1.5
  catboost:
    iterations: 2500
    early_stopping_rounds: 150
    learning_rate: 0.04
    depth: 7
    l2_leaf_reg: 5.0
    random_seed: 42
    rsm: 0.85
    random_strength: 1.0
  catboost_a:
    iterations: 2000
    early_stopping_rounds: 150
    learning_rate: 0.05
    depth: 8
    l2_leaf_reg: 3.0
    random_seed: 123
    rsm: 0.75
    random_strength: 2.0

cv:
  n_splits: 10
  seed: 42
  stratified: true
