
# Iteration 002 (website V13) — V11's HIGH-class techniques applied to the new pipeline.
# Expected delta vs V12 (CV bal-acc 0.9636): +~0.008 toward V11's 0.9726.
#
# Changes vs V12:
#   * metric = balanced_accuracy (matches Kaggle's eval + the website's tracked metric)
#   * class_weights = balanced  → LGBM trained with sklearn-style sample_weight
#   * features:
#       + s6e4_interactions (ratios/products/diffs between correlated weather+soil pairs)
#       + target_encode_multiclass (per-fold P(y=k|cat) for each of 3 classes, smoothing=10)
#   * Hparams held close to V12 to isolate the effect of weights + features.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

features:
  - fill_na_median
  - s6e4_threshold_booleans
  - s6e4_interactions
  - label_encode
  - target_encode_multiclass        # per-fold (needs y_tr); runs inside CV loop

model: lgbm

params:
  num_boost_round: 2500
  early_stopping_rounds: 100
  learning_rate: 0.04
  num_leaves: 63
  min_data_in_leaf: 50
  feature_fraction: 0.85
  bagging_fraction: 0.85
  bagging_freq: 5
  lambda_l2: 1.5

cv:
  n_splits: 5
  seed: 42
  stratified: true
