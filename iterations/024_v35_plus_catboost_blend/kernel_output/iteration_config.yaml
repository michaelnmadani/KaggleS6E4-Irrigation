
# Iteration 024 (website V36) — V35 + CatBoost blend via meta-stacker.
#
# V35 (CV 0.97523) only gained +0.0002 over V34's 0.97503. Stratified + miadul
# under-delivered. Need the CatBoost-diversity lever next.
#
# Research (NVIDIA Grandmasters Playbook; S4E10 CatBoost writeups): CatBoost
# + XGBoost blend on identical features is the most reliable +0.001-0.003 on
# synthetic PS. CatBoost's symmetric oblivious trees + ordered boosting
# produce maximally decorrelated errors vs XGBoost's asymmetric depth-4 trees.
# Meta-stacker extracts more than simple 0.5/0.5 average because it can
# optimise weighted L1/L2/EN logistic regression on stacked probs.
#
# Postprocess chain: meta_stacker (fold-level stacking) -> class_weight_optuna
# (200 trials, argmax tuning). Both landed on top of V34/V35, expected to
# stack additively here.
#
# Runtime projection: XGB 65min + CatBoost GPU 60-90min + meta-stacker <5min
# + Optuna <1min = ~2.5h. Well under 9h GPU cap.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 0.35

kernel:
  enable_gpu: true
  enable_internet: true

pip_install:
  - optuna

features:
  - fill_na_median
  - s6e4_digit_extraction_wide
  - s6e4_freq_filter_cats
  - ordered_te

model:
  - xgb
  - catboost

# CB-heavy since author's XGB-only hit 0.9798 and CatBoost adds diversity, not
# dominance. 60/40 split per V11 pattern.
blend_weights:
  xgb: 0.6
  catboost: 0.4

postprocess:
  - meta_stacker
  - class_weight_optuna

optuna_trials: 200

params:
  xgb:
    num_boost_round: 512
    early_stopping_rounds: 1024
    eta: 0.1
    max_depth: 4
    max_leaves: 30
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 5
    reg_lambda: 5
    min_child_weight: 2
    tree_method: hist
    max_bin: 10000
    device: cuda
  catboost:
    iterations: 3000
    early_stopping_rounds: 100
    learning_rate: 0.05
    depth: 6
    l2_leaf_reg: 5.0
    random_seed: 42
    task_type: GPU   # mirror XGB's GPU use; big speedup vs CPU on 2.52M rows
    bootstrap_type: Bayesian
    bagging_temperature: 1.0

cv:
  n_splits: 5
  seed: 42
  stratified: true
