
# Iteration 001 — baseline for S6E4 Irrigation.
# Replicates the cdeotte-style approach: 4 threshold-boolean features + LGBM
# on one-hot categoricals. A near-optimal feature set per the original dataset.

target: Irrigation_Need       # string labels Low/Medium/High, auto-encoded to 0/1/2
id_col: id
task: multiclass
metric: accuracy

features:
  - s6e4_threshold_booleans   # soil<25, temp>30, rain<300, wind>10
  - label_encode              # Crop_Growth_Stage, Mulching_Used -> integer codes

model: lgbm

params:
  num_boost_round: 2000
  early_stopping_rounds: 100
  learning_rate: 0.05
  num_leaves: 31
  min_data_in_leaf: 50
  feature_fraction: 0.9
  bagging_fraction: 0.9
  bagging_freq: 5
  lambda_l2: 1.0

cv:
  n_splits: 5
  seed: 42
  stratified: true
