# Iteration 021 (website V33) — V32 with torch pinned for Kaggle P100 (sm_60).
#
# V32 errored: "CUDA error: no kernel image is available for execution on the
# device". Same issue V21 hit. Kaggle P100 GPUs are sm_60 but stock torch ships
# only sm_70+ kernels. Pin torch==2.4.1 with cu121 wheels (has sm_60).
#
# Rest identical to V32.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 0.35

kernel:
  enable_gpu: true
  enable_internet: true

pip_install:
  - torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cu121
  - pytabkit
  - scikit-learn==1.5.2

features:
  - fill_na_median
  - s6e4_threshold_booleans
  - s6e4_interactions
  - label_encode
  - target_encode_multiclass

model:
  - lgbm
  - catboost
  - pytabkit_realmlp

blend_weights:
  catboost: 0.60
  lgbm: 0.30
  pytabkit_realmlp: 0.10

postprocess:
  - meta_stacker
  - caruana

params:
  lgbm:
    num_boost_round: 2500
    early_stopping_rounds: 100
    learning_rate: 0.04
    num_leaves: 63
    min_data_in_leaf: 50
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    lambda_l2: 1.5
  catboost:
    iterations: 2500
    early_stopping_rounds: 150
    learning_rate: 0.04
    depth: 7
    l2_leaf_reg: 5.0
    random_seed: 42
    rsm: 0.85
    random_strength: 1.0
  pytabkit_realmlp:
    device: cuda
    n_cv: 1
    n_epochs: 150
    random_state: 42

cv:
  n_splits: 5
  seed: 42
  stratified: true
