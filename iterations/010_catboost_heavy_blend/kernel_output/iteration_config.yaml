
# Iteration 010 (website V22) — V11-style CatBoost-heavy 3-model blend.
#
# V14 (equal-weight blend) scored 0.96812, worse than CatBoost-alone (0.96987).
# V15 went CatBoost-solo and reached 0.96978. V22 adds LGBM + XGB back in but
# with V11's proven non-equal weights (CB=0.65, LGBM=0.25, XGB=0.10), which
# is exactly the piece V14 skipped.
#
# Expected CV: 0.972-0.974 (approaching V11's all-time 0.97256).
# Target: cross 0.975 if CatBoost tightens further from 10-fold stability.

target: Irrigation_Need
id_col: id
task: multiclass
metric: balanced_accuracy

class_weights: balanced

extra_dataset:
  slug: miadul/irrigation-water-requirement-prediction-dataset
  file: irrigation_prediction.csv
  weight: 0.35

features:
  - fill_na_median
  - s6e4_threshold_booleans
  - s6e4_interactions
  - label_encode
  - target_encode_multiclass

model:
  - lgbm
  - xgb
  - catboost

# V11's hand-tuned weights, overrides default score-proportional blending.
blend_weights:
  catboost: 0.65
  lgbm: 0.25
  xgb: 0.10

params:
  lgbm:
    num_boost_round: 2500
    early_stopping_rounds: 100
    learning_rate: 0.04
    num_leaves: 63
    min_data_in_leaf: 50
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    lambda_l2: 1.5
  xgb:
    num_boost_round: 2000
    early_stopping_rounds: 100
    eta: 0.04
    max_depth: 8
    subsample: 0.85
    colsample_bytree: 0.85
    reg_lambda: 1.5
  catboost:
    iterations: 2500
    early_stopping_rounds: 150
    learning_rate: 0.04
    depth: 7
    l2_leaf_reg: 5.0
    random_seed: 42

cv:
  n_splits: 10
  seed: 42
  stratified: true
